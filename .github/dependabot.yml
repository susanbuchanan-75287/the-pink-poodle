version: 2
updates:
  # Cloud Functions backend dependencies (SendGrid, Twilio, firebase-*)
  - package-ecosystem: "npm"
    directory: "/functions"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      # Batch routine minor/patch bumps into one PR to reduce noise
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by any workflows in this repo
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
